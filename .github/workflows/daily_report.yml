name: Market Intelligence Daily Report

on:
  schedule:
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-crosextra-caladea fonts-crosextra-carlito
          fc-cache -f -v

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetcher.py

      - name: Generate PDF report
        run: python pdf_generator.py market_data.json report.pdf

      - name: Commit PDF and data to repo
        run: |
          git config user.name "Doha Bank MI Bot"
          git config user.email "mi-bot@dohabank.com"
          git add -A
          git status
          git diff --staged --quiet || git commit -m "Daily report $(date +'%Y-%m-%d')"
          git push

      - name: Send email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python send_email.py

      - name: Send WhatsApp via Make.com and 2Chat
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          GITHUB_REPO: "doha-bank-mi"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python send_whatsapp.py

      - name: Write send log to JSON and Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
        run: |
          python3 - << 'PYEOF'
          import json
          import os
          from datetime import datetime, timezone, timedelta
          from supabase import create_client

          ast = timezone(timedelta(hours=3))
          now = datetime.now(ast)

          sb = create_client(
              os.environ["SUPABASE_URL"],
              os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          )

          # Pull active recipient counts from Supabase
          email_resp = (
              sb.table("recipients")
              .select("id", count="exact")
              .eq("channel", "email")
              .eq("active", True)
              .execute()
          )
          wa_resp = (
              sb.table("recipients")
              .select("id", count="exact")
              .eq("channel", "whatsapp")
              .eq("active", True)
              .execute()
          )

          email_count = email_resp.count or 0
          wa_count = wa_resp.count or 0

          pdf_url = f"https://raw.githubusercontent.com/{os.environ['GITHUB_OWNER']}/doha-bank-mi/main/report.pdf"

          entry = {
              "date": now.strftime("%Y-%m-%d"),
              "time": now.strftime("%H:%M"),
              "status": "success",
              "email_count": email_count,
              "wa_count": wa_count
          }

          # Write local JSON log for dashboard/backward compatibility
          log = []
          if os.path.exists("send_log.json"):
              with open("send_log.json", "r", encoding="utf-8") as f:
                  try:
                      log = json.load(f)
                  except Exception:
                      log = []

          log.insert(0, entry)

          with open("send_log.json", "w", encoding="utf-8") as f:
              json.dump(log[:30], f, indent=2)

          print("Local JSON log updated:", entry)

          # Write log to Supabase
          sb.table("send_log").insert({
              "report_date": now.strftime("%Y-%m-%d"),
              "sent_at": now.isoformat(),
              "status": "success",
              "email_count": email_count,
              "wa_count": wa_count,
              "pdf_url": pdf_url,
              "notes": "Workflow completed successfully"
          }).execute()

          print("Supabase send_log inserted successfully")
          PYEOF
      - name: Copy live JSON files to docs for dashboard
        run: |
          cp market_data.json docs/market_data.json
          if [ -f send_log.json ]; then cp send_log.json docs/send_log.json; fi
      - name: Commit send log
        run: |
          git config user.name "Doha Bank MI Bot"
          git config user.email "mi-bot@dohabank.com"
          git add send_log.json
          git diff --staged --quiet || git commit -m "Send log $(date +'%Y-%m-%d')"
          git push
