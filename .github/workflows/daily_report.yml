name: Market Intelligence Daily Report

on:
  schedule:
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-crosextra-carlito fonts-crosextra-caladea

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic>=0.25.0 yfinance>=0.2.40 feedparser>=6.0.11 requests>=2.31.0 reportlab>=4.0.0 pandas>=2.0.0 supabase>=2.0.0

      - name: Fetch market data
        run: |
          python3 fetcher.py

      - name: Validate market data as warning only
        run: |
          python3 - << 'PYEOF'
          import json
          import sys

          try:
              with open("market_data.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
          except Exception as e:
              print("WARNING: Could not read market_data.json")
              print(str(e))
              sys.exit(0)

          issues = data.get("validation_issues", [])

          if issues:
              print("WARNING VALIDATION ISSUES:")
              for issue in issues:
                  print(f"- {issue}")
              print("Workflow will continue. Report status remains needs_review.")
          else:
              print("Market data validation passed.")
          PYEOF

      - name: Generate PDF report
        run: |
          python3 pdf_generator.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add market_data.json report.pdf docs/index.html || true

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "Update daily market intelligence report"
            git push
          fi

      - name: Send approved report email
        run: |
          python3 send_email.py
