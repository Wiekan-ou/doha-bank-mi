name: Market Intelligence Daily Report

on:
  schedule:
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-crosextra-caladea fonts-crosextra-carlito
          fc-cache -f -v

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetcher.py

      - name: Generate PDF report
        run: python pdf_generator.py market_data.json report.pdf

      - name: Commit PDF and data to repo
        run: |
          git config user.name "Doha Bank MI Bot"
          git config user.email "mi-bot@dohabank.com"
          git add -A
          git status
          git diff --staged --quiet || git commit -m "Daily report $(date +'%Y-%m-%d')"
          git push

      - name: Send email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python send_email.py

      - name: Send WhatsApp via Make.com and 2Chat
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          GITHUB_OWNER: ${{ secrets.GITHUB_OWNER }}
          GITHUB_REPO: "doha-bank-mi"
        run: python send_whatsapp.py

      - name: Write send log
        run: |
          python3 -c "
          import json, os
          from datetime import datetime, timezone, timedelta
          ast = timezone(timedelta(hours=3))
          now = datetime.now(ast)
          recips = json.load(open('recipients.json'))
          wa = len([r for r in recips.get('whatsapp',[]) if r.get('active')])
          em = len([r for r in recips.get('email',[]) if r.get('active')])
          entry = {'date': now.strftime('%Y-%m-%d'), 'time': now.strftime('%H:%M'), 'status': 'success', 'email_count': em, 'wa_count': wa}
          log = []
          if os.path.exists('send_log.json'):
              log = json.load(open('send_log.json'))
          log.insert(0, entry)
          json.dump(log[:30], open('send_log.json','w'), indent=2)
          print('Log updated:', entry)
          "

      - name: Commit send log
        run: |
          git config user.name "Doha Bank MI Bot"
          git config user.email "mi-bot@dohabank.com"
          git add send_log.json
          git diff --staged --quiet || git commit -m "Send log $(date +'%Y-%m-%d')"
          git push
