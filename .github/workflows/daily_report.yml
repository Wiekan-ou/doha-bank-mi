name: Market Intelligence Daily Report

on:
  schedule:
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-crosextra-carlito fonts-crosextra-caladea

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic>=0.25.0 yfinance>=0.2.40 feedparser>=6.0.11 requests>=2.31.0 reportlab>=4.0.0 pandas>=2.0.0 supabase>=2.0.0

      - name: Fetch market data and news
        run: |
          python3 fetcher.py

      - name: Validate report and set send gate
        id: validate
        run: |
          python3 validate_report.py market_data.json

      - name: Generate PDF report
        run: |
          python3 pdf_generator.py market_data.json report.pdf

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add market_data.json report.pdf docs/index.html || true

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "Update daily market intelligence report"
            git push
          fi

      - name: Send report email only if validation passed
        if: steps.validate.outputs.status == 'PASS'
        run: |
          python3 send_email.py

      - name: Block distribution for non-pass reports
        if: steps.validate.outputs.status != 'PASS'
        run: |
          echo "Report was generated and committed for internal review only."
          echo "Email distribution blocked because validation status is ${{ steps.validate.outputs.status }}."
