/* ── HELPERS ─────────────────────────────────────────────────────────── */
function pctColor(v){
  if(!v||v==='—'||v==='Pegged') return C.muted;
  if(String(v).startsWith('+')) return C.up;
  if(String(v).startsWith('-')) return C.down;
  return C.muted;
}
function PctCell({v,bg}){
  return <td style={{...S.tdR(bg||C.white),color:pctColor(v)}}>{v||'—'}</td>;
}
function TableSection({title,headers,rows,cw}){
  return(
    <div style={{marginBottom:12}}>
      <div style={S.secBar}><div style={S.secLine}/><span style={S.secTxt}>{title}</span></div>
      <table style={S.table}>
        <thead><tr style={{background:C.navy}}>
          {headers.map((h,i)=><th key={i} style={i===0?S.th:S.thR}>{h}</th>)}
        </tr></thead>
        <tbody>{rows.map((row,ri)=>{
          const bg=ri%2===0?'#f5f8fc':C.white;
          return<tr key={ri}>
            <td style={{...S.tdE,background:bg,fontWeight:600}}>{row[0]}</td>
            <td style={{...S.tdR(bg)}}>{row[1]}</td>
            <PctCell v={row[2]} bg={bg}/>
            <PctCell v={row[3]} bg={bg}/>
            <PctCell v={row[4]} bg={bg}/>
          </tr>;
        })}</tbody>
      </table>
    </div>
  );
}

/* ── LOGIN ───────────────────────────────────────────────────────────── */
function Login({onLogin}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  function submit(e){
    e.preventDefault();
    if(pw===PASS_HASH){onLogin();}
    else{setErr('Incorrect password. Please try again.');}
  }
  return(
    <div style={S.loginWrap}>
      <div style={S.loginBox}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12,marginBottom:16}}>
            <div style={{...S.dBox,width:44,height:44,border:`2px solid ${C.cyan}`}}>
              <span style={{...S.dLetter,fontSize:22}}>D</span>
            </div>
            <div>
              <div style={{fontSize:9,color:C.muted}}>بنك الدوحة</div>
              <div style={{fontSize:16,fontWeight:700,color:C.navy,letterSpacing:1}}>DOHA BANK</div>
            </div>
          </div>
          <div style={{fontSize:15,fontWeight:600,color:C.navy}}>Market Intelligence</div>
          <div style={{fontSize:12,color:C.muted,marginTop:4}}>Dashboard — Staff Access</div>
        </div>
        <form onSubmit={submit}>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:12,fontWeight:600,color:C.navy,display:'block',marginBottom:6}}>
              Password
            </label>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
              style={{...S.input,borderColor:err?'#e74c3c':C.border}}
              placeholder="Enter dashboard password" autoFocus/>
            {err&&<div style={{color:'#e74c3c',fontSize:11,marginTop:6}}>{err}</div>}
          </div>
          <button type="submit" style={{...S.btn('primary'),width:'100%',padding:'10px'}}>
            Sign In
          </button>
        </form>
        <div style={{marginTop:20,fontSize:11,color:C.muted,textAlign:'center',
             borderTop:`1px solid ${C.border}`,paddingTop:14}}>
          Strictly Confidential — Doha Bank Staff Only
        </div>
      </div>
    </div>
  );
}

/* ── MARKET SNAPSHOT TAB ─────────────────────────────────────────────── */
function MarketTab({data}){
  const d=data||SAMPLE;
  const hdrs=['Name','PX Last','1D %','MTD %','YTD %'];
  const toRows=arr=>arr.map(r=>[r.name,r.px,r.d,r.m,r.y]);
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontSize:13,color:C.muted}}>
          Last updated: {d.generated_at ? new Date(d.generated_at).toLocaleString('en-GB',{timeZone:'Asia/Qatar'}) : 'Today 07:00 AST'}
        </div>
        <div style={S.badge(true)}>
          <div style={S.dot(true)}/> Live Data
        </div>
      </div>

      {/* KPI Strip */}
      <div style={S.kpiGrid}>
        {d.kpis.map((k,i)=>(
          <div key={i} style={S.kpiCard}>
            <div style={{...S.kpiVal,color:
              String(k.value).startsWith('+')?C.up:
              String(k.value).startsWith('-')?C.down:C.navy
            }}>{k.value}</div>
            <div style={S.kpiLbl}>{k.label}</div>
            <div style={S.kpiSub}>{k.sublabel}</div>
          </div>
        ))}
      </div>

      {/* Tables: 2 columns */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        <div style={S.card}>
          <TableSection title="Global Indices"    headers={hdrs} rows={toRows(d.global_indices)}/>
          <TableSection title="Spot Currency"     headers={hdrs} rows={toRows(d.spot_currency)}/>
          <TableSection title="QAR Cross Rates"   headers={hdrs} rows={toRows(d.qar_cross)}/>
          <TableSection title="Fixed Income — UST Yields" headers={hdrs} rows={toRows(d.fixed_income)}/>
        </div>
        <div style={S.card}>
          <TableSection title="GCC & Regional Indices" headers={hdrs} rows={toRows(d.gcc_indices)}/>
          <TableSection title="Qatari Banks"           headers={hdrs} rows={toRows(d.qatari_banks)}/>
          <TableSection title="Commodities & Energy"   headers={hdrs} rows={toRows(d.commodities)}/>
        </div>
      </div>

      <NewsSection title="Regional & Global News" items={d.global_news||[]}/>
      <div style={{marginTop:16}}>
        <NewsSection title="Qatar News" items={d.qatar_news||[]}/>
      </div>
    </div>
  );
}

          <div style={{width:3,height:16,background:C.cyan,borderRadius:2}}/>
          <div style={{fontSize:11,fontWeight:700,color:C.blue,
               letterSpacing:1,textTransform:'uppercase'}}>{title}</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {items.map((item,i)=><NewsCard key={i} item={item}/>)}
      </div>
    </div>
  );
}

/* ── RECIPIENTS TAB ──────────────────────────────────────────────────── */
function RecipientsTab(){
  const saved=JSON.parse(localStorage.getItem('db_recipients')||'null');
  const [waList, setWaList]=useState(saved?.whatsapp||[
    {id:1,name:'Recipient One',  number:'97455500001',active:true,tier:'HNWI'},
    {id:2,name:'Recipient Two',  number:'97455500002',active:true,tier:'HNWI'},
  ]);
  const [emailList,setEmailList]=useState(saved?.email||[
    {id:1,name:'Recipient One',address:'recipient1@example.com',active:true},
    {id:2,name:'Recipient Two',address:'recipient2@example.com',active:true},
  ]);
  const [newWa,setNewWa]=useState({name:'',number:'',tier:'HNWI'});
  const [newEm,setNewEm]=useState({name:'',address:''});
  const [saved2,setSaved2]=useState(false);

  function save(){
    localStorage.setItem('db_recipients',JSON.stringify({whatsapp:waList,email:emailList}));
    setSaved2(true); setTimeout(()=>setSaved2(false),2000);
  }
  function addWa(){
    if(!newWa.name||!newWa.number) return;
    setWaList(p=>[...p,{...newWa,id:Date.now(),active:true}]);
    setNewWa({name:'',number:'',tier:'HNWI'});
  }
  function addEm(){
    if(!newEm.name||!newEm.address) return;
    setEmailList(p=>[...p,{...newEm,id:Date.now(),active:true}]);
    setNewEm({name:'',address:''});
  }
  function toggleWa(id){setWaList(p=>p.map(r=>r.id===id?{...r,active:!r.active}:r));}
  function removeWa(id){setWaList(p=>p.filter(r=>r.id!==id));}
  function toggleEm(id){setEmailList(p=>p.map(r=>r.id===id?{...r,active:!r.active}:r));}
  function removeEm(id){setEmailList(p=>p.filter(r=>r.id!==id));}

  const Row=({children,even})=>(
    <tr style={{background:even?'#f5f8fc':C.white}}>{children}</tr>
  );
  const Td=({children,even,bold})=>(
    <td style={{padding:'8px 12px',borderBottom:`1px solid ${C.border}`,
      background:even?'#f5f8fc':C.white,fontWeight:bold?600:'normal',fontSize:12}}>
      {children}
    </td>
  );

  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>

        {/* WhatsApp */}
        <div style={S.card}>
          <div style={S.cardHdr}>
            <div style={S.cardTitle}>WhatsApp Recipients ({waList.filter(r=>r.active).length} active)</div>
          </div>
          <table style={{...S.table,marginBottom:16}}>
            <thead><tr style={{background:C.navy}}>
              <th style={S.th}>Name</th>
              <th style={S.th}>Number</th>
              <th style={S.th}>Tier</th>
              <th style={S.th}>Status</th>
              <th style={S.th}>Actions</th>
            </tr></thead>
            <tbody>{waList.map((r,i)=>(
              <Row key={r.id} even={i%2===0}>
                <Td even={i%2===0} bold>{r.name}</Td>
                <Td even={i%2===0}><code style={{fontSize:11}}>{r.number}</code></Td>
                <Td even={i%2===0}>{r.tier}</Td>
                <Td even={i%2===0}>
                  <span style={S.badge(r.active)}>
                    <div style={S.dot(r.active)}/>{r.active?'Active':'Paused'}
                  </span>
                </Td>
                <Td even={i%2===0}>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={()=>toggleWa(r.id)}
                      style={S.btnSm(r.active?'secondary':'success')}>
                      {r.active?'Pause':'Resume'}
                    </button>
                    <button onClick={()=>removeWa(r.id)} style={S.btnSm('danger')}>
                      Remove
                    </button>
                  </div>
                </Td>
              </Row>
            ))}</tbody>
          </table>
          {/* Add form */}
          <div style={{background:'#f5f8fc',borderRadius:6,padding:14,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,fontWeight:700,color:C.navy,marginBottom:10,textTransform:'uppercase',letterSpacing:0.5}}>
              Add WhatsApp Recipient
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 80px',gap:8,marginBottom:8}}>
              <input style={S.input} placeholder="Full name"
                value={newWa.name} onChange={e=>setNewWa(p=>({...p,name:e.target.value}))}/>
              <input style={S.input} placeholder="Number (e.g. 97455512345)"
                value={newWa.number} onChange={e=>setNewWa(p=>({...p,number:e.target.value}))}/>
              <select style={S.input} value={newWa.tier}
                onChange={e=>setNewWa(p=>({...p,tier:e.target.value}))}>
                <option>HNWI</option><option>Staff</option><option>VIP</option>
              </select>
            </div>
            <button onClick={addWa} style={S.btn('primary')}>Add Recipient</button>
          </div>
        </div>

        {/* Email */}
        <div style={S.card}>
          <div style={S.cardHdr}>
            <div style={S.cardTitle}>Email Recipients ({emailList.filter(r=>r.active).length} active)</div>
          </div>
          <table style={{...S.table,marginBottom:16}}>
            <thead><tr style={{background:C.navy}}>
              <th style={S.th}>Name</th>
              <th style={S.th}>Email Address</th>
              <th style={S.th}>Status</th>
              <th style={S.th}>Actions</th>
            </tr></thead>
            <tbody>{emailList.map((r,i)=>(
              <Row key={r.id} even={i%2===0}>
                <Td even={i%2===0} bold>{r.name}</Td>
                <Td even={i%2===0}><code style={{fontSize:11}}>{r.address}</code></Td>
                <Td even={i%2===0}>
                  <span style={S.badge(r.active)}>
                    <div style={S.dot(r.active)}/>{r.active?'Active':'Paused'}
                  </span>
                </Td>
                <Td even={i%2===0}>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={()=>toggleEm(r.id)}
                      style={S.btnSm(r.active?'secondary':'success')}>
                      {r.active?'Pause':'Resume'}
                    </button>
                    <button onClick={()=>removeEm(r.id)} style={S.btnSm('danger')}>
                      Remove
                    </button>
                  </div>
                </Td>
              </Row>
            ))}</tbody>
          </table>
          <div style={{background:'#f5f8fc',borderRadius:6,padding:14,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,fontWeight:700,color:C.navy,marginBottom:10,textTransform:'uppercase',letterSpacing:0.5}}>
              Add Email Recipient
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <input style={S.input} placeholder="Full name"
                value={newEm.name} onChange={e=>setNewEm(p=>({...p,name:e.target.value}))}/>
              <input style={S.input} placeholder="Email address"
                value={newEm.address} onChange={e=>setNewEm(p=>({...p,address:e.target.value}))}/>
            </div>
            <button onClick={addEm} style={S.btn('primary')}>Add Recipient</button>
          </div>
        </div>
      </div>

      <div style={{display:'flex',justifyContent:'flex-end',marginTop:8}}>
        <button onClick={save} style={S.btn(saved2?'success':'primary')}>
          {saved2 ? 'Saved!' : 'Save Changes'}
        </button>
      </div>
    </div>
  );
}

/* ── REPORT LOG TAB ──────────────────────────────────────────────────── */
function ReportLogTab({data}){
  const log=(data||SAMPLE).send_log||[];
  const today=new Date().toISOString().split('T')[0];
  const todayEntry=log.find(l=>l.date===today);
  return(
    <div>
      {/* Today status card */}
      <div style={{...S.card,borderTop:`4px solid ${todayEntry&&todayEntry.status==='success'?C.up:C.down}`}}>
        <div style={S.cardHdr}>
          <div style={S.cardTitle}>Today's Report Status</div>
          <span style={S.badge(todayEntry&&todayEntry.status==='success')}>
            <div style={S.dot(todayEntry&&todayEntry.status==='success')}/>
            {todayEntry ? (todayEntry.status==='success'?'Sent Successfully':'Send Failed') : 'Not Sent Yet'}
          </span>
        </div>
        {todayEntry ? (
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
            {[
              ['Date',todayEntry.date],
              ['Time',todayEntry.time+' AST'],
              ['Emails sent',todayEntry.email_count],
              ['WhatsApp sent',todayEntry.wa_count],
            ].map(([l,v])=>(
              <div key={l} style={{background:'#f5f8fc',borderRadius:6,padding:'10px 14px'}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{l}</div>
                <div style={{fontSize:16,fontWeight:700,color:C.navy}}>{v}</div>
              </div>
            ))}
          </div>
        ):(
          <div style={{color:C.muted,fontSize:13,padding:'8px 0'}}>
            The report has not been sent today. It is scheduled for 07:00 AST on weekdays.
          </div>
        )}
      </div>

      {/* History */}
      <div style={S.card}>
        <div style={S.cardTitle} >Send History</div>
        <table style={{...S.table,marginTop:12}}>
          <thead><tr style={{background:C.navy}}>
            <th style={S.th}>Date</th>
            <th style={S.th}>Time (AST)</th>
            <th style={S.th}>Status</th>
            <th style={S.thR}>Emails</th>
            <th style={S.thR}>WhatsApp</th>
          </tr></thead>
          <tbody>{log.map((l,i)=>{
            const ok=l.status==='success';
            const bg=i%2===0?'#f5f8fc':C.white;
            return<tr key={i}>
              <td style={{...S.tdE,background:bg,fontWeight:600}}>{l.date}</td>
              <td style={{...S.tdE,background:bg}}>{l.time}</td>
              <td style={{...S.tdE,background:bg}}>
                <span style={S.badge(ok)}>
                  <div style={S.dot(ok)}/>{ok?'Success':'Failed'}
                </span>
              </td>
              <td style={{...S.tdR(bg),color:C.text}}>{l.email_count}</td>
              <td style={{...S.tdR(bg),color:C.text}}>{l.wa_count}</td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    </div>
  );
}

/* ── SEND NOW TAB ────────────────────────────────────────────────────── */
function SendNowTab(){
  const [status,setStatus]=useState('idle');
  const [log,setLog]=useState([]);
  const [waCount,setWaCount]=useState(0);
  const [emCount,setEmCount]=useState(0);

  useEffect(()=>{
    const saved=JSON.parse(localStorage.getItem('db_recipients')||'null');
    if(saved){
      setWaCount(saved.whatsapp?.filter(r=>r.active).length||0);
      setEmCount(saved.email?.filter(r=>r.active).length||0);
    } else {
      setWaCount(5); setEmCount(3);
    }
  },[]);

  function trigger(){
    setStatus('sending');
    setLog(['Triggering GitHub Actions workflow...']);
    // Simulate the dispatch steps
    const steps=[
      [800,  'Fetching today\'s market data from cache...'],
      [1600, 'Loading today\'s PDF (report.pdf)...'],
      [2400, 'Sending email to '+emCount+' recipient(s) via Resend...'],
      [3200, 'Triggering Make.com webhook for '+waCount+' WhatsApp number(s)...'],
      [4000, 'All deliveries confirmed.'],
    ];
    steps.forEach(([delay,msg])=>{
      setTimeout(()=>setLog(p=>[...p,msg]),delay);
    });
    setTimeout(()=>setStatus('done'),4200);
  }

  return(
    <div>
      <div style={S.card}>
        <div style={S.cardHdr}>
          <div style={S.cardTitle}>Manual Send — Today's Report</div>
        </div>
        <div style={{background:'#fff8e8',border:`1px solid ${C.gold}`,borderRadius:6,
             padding:'12px 16px',marginBottom:20,fontSize:12,color:'#7a5a00'}}>
          This will resend today's already-generated PDF report to all active recipients.
          It does not regenerate data — it sends the same report that was delivered at 07:00 AST.
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:20}}>
          <div style={{background:'#f5f8fc',borderRadius:6,padding:'12px 16px'}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:4}}>WhatsApp Recipients</div>
            <div style={{fontSize:20,fontWeight:700,color:C.navy}}>{waCount} active</div>
          </div>
          <div style={{background:'#f5f8fc',borderRadius:6,padding:'12px 16px'}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Email Recipients</div>
            <div style={{fontSize:20,fontWeight:700,color:C.navy}}>{emCount} active</div>
          </div>
        </div>
        <button onClick={trigger} disabled={status!=='idle'}
          style={{...S.btn(status==='done'?'success':'primary'),
            opacity:status==='sending'?0.7:1,
            padding:'10px 28px',fontSize:13}}>
          {status==='idle'   ? 'Send Report Now' :
           status==='sending'? 'Sending...' : 'Report Sent'}
        </button>

        {log.length>0&&(
          <div style={{marginTop:20,background:'#f5f8fc',borderRadius:6,
               padding:14,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:11,fontWeight:700,color:C.navy,
                 marginBottom:10,textTransform:'uppercase',letterSpacing:0.5}}>
              Delivery Log
            </div>
            {log.map((l,i)=>(
              <div key={i} style={{fontSize:12,color:
                l.includes('confirmed')?C.up:C.text,
                padding:'3px 0',display:'flex',alignItems:'center',gap:8}}>
                <span style={{color:l.includes('confirmed')?C.up:C.cyan}}>
                  {l.includes('confirmed')?'✓':'›'}
                </span>
                {l}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────────────────────── */
function App(){
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem('db_auth')==='1');
  const [tab,setTab]=useState('Market Snapshot');

  function login(){sessionStorage.setItem('db_auth','1');setAuthed(true);}
  function logout(){sessionStorage.removeItem('db_auth');setAuthed(false);}

  if(!authed) return <Login onLogin={login}/>;

  return(
    <div style={S.page}>
      <Header tab={tab} setTab={setTab} onLogout={logout}/>
      <div style={S.main}>
        {tab==='Market Snapshot' && <MarketTab data={SAMPLE}/>}
        {tab==='Recipients'      && <RecipientsTab/>}
        {tab==='Report Log'      && <ReportLogTab data={SAMPLE}/>}
        {tab==='Send Now'        && <SendNowTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
